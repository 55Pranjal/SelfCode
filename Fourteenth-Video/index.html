<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Design</title>
  </head>
  <body>
    <div class="box">Responsive design</div>

    <style>
      .box {
        background-color: red;
      }

      @media (max-width: 768px) {
        .box {
          background-color: blue;
        }
      }
    </style>
  </body>
</html>
