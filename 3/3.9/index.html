<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
  </head>
  <body>
    <h1>Searchable Gallery</h1>

    <input type="text" placeholder="Search your image" id="searchInput" />
    <p id="status"></p>

    <div id="gallery"></div>

    <div id="modal" class="hidden">
      <span id="modalClose">&times;</span>
      <img src="" alt="" id="modalImage" />
      <p id="modalCaption"></p>
    </div>

    <style>
      body {
        font-family: sans-serif;
        margin: 20px;
      }

      #searchInput {
        padding: 8px;
        width: 300px;
        font-size: 16px;
      }

      #gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .card {
        cursor: pointer;
        border: 1px solid #ddd;
        border-radius: 6px;
        overflow: hidden;
        background: #fafafa;
      }

      .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        display: block;
      }

      .card p {
        margin: 6px 8px;
        font-size: 14px;
        color: #333;
      }

      #modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 10;
      }

      #modal.hidden {
        display: none;
      }

      #modalImage {
        max-width: 90vw;
        max-height: 80vh;
      }

      #modalCaption {
        color: #fff;
        margin-top: 12px;
      }

      #modalClose {
        position: absolute;
        top: 16px;
        right: 24px;
        color: #fff;
        font-size: 40px;
        cursor: pointer;
      }
    </style>

    <script src="app.js"></script>
  </body>
</html>
