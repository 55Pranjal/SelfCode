<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Page</title>
  </head>
  <body>
    <header>
      <h1>My Portfolio</h1>
      <nav>
        <a href="index.html">Home</a><a class="a-tag" href="about.html">About</a
        ><a href="contact.html">Contact</a>
      </nav>
    </header>
    <main>
      <form action="">
        <h3>Send me your query directly to my mail</h3>
        <input type="text" placeholder="Enter you query" />
        <button>Send</button>
      </form>

      <div>
        <h3>Contact Me</h3>
        <p>Email: example@example.com</p>
        <p>Phone: 123-456-7890</p>
      </div>
    </main>
    <footer>Copyright</footer>

    <style>
      * {
        padding: 0;
        margin: 0;
      }

      header {
        background-color: black;
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
      }

      header nav {
        margin-top: 10px;
      }

      header a {
        text-decoration: none;
        color: white;
      }

      .a-tag {
        margin-left: 8px;
        margin-right: 8px;
      }

      main {
        padding: 20px;
        text-align: center;
        height: 400px;
      }

      main form {
        padding: 10px;
        margin-top: 50px;
      }

      main form h3 {
        margin-bottom: 10px;
      }

      main div {
        margin-top: 200px;
      }

      footer {
        background-color: black;
        color: white;
        height: 500px;
        font-size: xx-large;
        text-align: center;
        padding: 10px;
      }

      @media (max-width: 768px) {
        header {
          flex-direction: column;
          align-items: center;
        }

        header nav {
          display: flex;
          flex-direction: column;
        }

        .a-tag {
          margin-left: 0;
          margin-right: 0;
          margin-top: 2px;
          margin-bottom: 2px;
        }
      }
    </style>
  </body>
</html>
