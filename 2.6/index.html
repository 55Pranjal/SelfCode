<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Layout</title>
  </head>
  <body>
    <div class="container">
      <div class="box1">1</div>
      <div class="box2">2</div>
      <div class="box3">3</div>
      <div class="box4">4</div>
      <div class="box5">5</div>
      <div class="box6">6</div>
    </div>

    <style>
      .container {
        display: grid;
        grid-template-rows: 100px 100px;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }

      .box6 {
        grid-column: 1/2;
        grid-row: 1/2;
        background-color: red;
      }

      .box5 {
        grid-column: 2/3;
        grid-row: 1/2;
        background-color: red;
      }

      .box4 {
        grid-column: 3;
        grid-row: 1/2;
        background-color: red;
      }

      .box3 {
        grid-column: 1/2;
        grid-row: 2;
        background-color: red;
      }

      .box2 {
        grid-column: 2/3;
        grid-row: 2;
        background-color: red;
      }

      .box1 {
        grid-column: 3;
        grid-row: 2;
        background-color: red;
      }
    </style>
  </body>
</html>
